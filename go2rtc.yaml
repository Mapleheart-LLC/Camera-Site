# go2rtc configuration
# Replace the mock RTSP URLs with your real camera streams before deploying.
# Mock addresses use the RFC 5737 documentation range (192.0.2.0/24) which
# do not route on the public internet.
# Documentation: https://github.com/AlexxIT/go2rtc

streams:
  # access_level 1 – free followers
  cam_lobby:
    - "exec:ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=25 -vcodec libx264 -preset ultrafast -tune zerolatency -g 50 -f rtsp rtsp://localhost:8554/cam_lobby 2>/dev/null"

  # access_level 2 – Tier 1 subscribers
  cam_vip_room:
    - "exec:ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=25 -vcodec libx264 -preset ultrafast -tune zerolatency -g 50 -f rtsp rtsp://localhost:8554/cam_vip_room 2>/dev/null"

  # access_level 3 – Tier 2+ subscribers
  cam_backstage:
    - "exec:ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=25 -vcodec libx264 -preset ultrafast -tune zerolatency -g 50 -f rtsp rtsp://localhost:8554/cam_backstage 2>/dev/null"

api:
  listen: ":1984"
  # Restrict to the hostname/port where the FastAPI frontend is served.
  # Replace with your actual domain in production (e.g. "https://example.com").
  # Using "*" is convenient for local development but should not be used in production.
  cors_origin: "http://localhost:8000"

webrtc:
  listen: ":8555/tcp"
