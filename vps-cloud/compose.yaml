services:
  # ── FastAPI backend ──────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Set SECRET_KEY in your shell or a .env file before running docker-compose.
      # Example: export SECRET_KEY=$(openssl rand -hex 32)
      - SECRET_KEY=${SECRET_KEY:-changeme-replace-in-production!!}
      # Persist DB in the named volume mount path
      - DATABASE_PATH=/app/data/camera_site.db
      # go2rtc service name so the backend can build WebRTC URLs for the client
      - GO2RTC_HOST=go2rtc
      - GO2RTC_PORT=1984
      # ── Fanvue OAuth 2.0 ──────────────────────────────
      # Register your app at https://app.fanvue.com/developer and paste the
      # credentials below (or export them as environment variables).
      - FANVUE_CLIENT_ID=${FANVUE_CLIENT_ID:-}
      - FANVUE_CLIENT_SECRET=${FANVUE_CLIENT_SECRET:-}
      # Must match the redirect URI registered with Fanvue.
      - FANVUE_REDIRECT_URI=${FANVUE_REDIRECT_URI:-http://localhost:8000/auth/callback}
      # Fanvue OAuth endpoints (defaults match the production Fanvue API)
      - FANVUE_AUTH_URL=${FANVUE_AUTH_URL:-https://app.fanvue.com/oauth/authorize}
      - FANVUE_TOKEN_URL=${FANVUE_TOKEN_URL:-https://api.fanvue.com/oauth/token}
      - FANVUE_PROFILE_URL=${FANVUE_PROFILE_URL:-https://api.fanvue.com/profile}
      # Optional: your Fanvue creator UUID (used for subscription checks)
      - FANVUE_CREATOR_ID=${FANVUE_CREATOR_ID:-}
      # Set MOCK_AUTH=true to bypass Fanvue OAuth (demo/testing only – never in production)
      - MOCK_AUTH=${MOCK_AUTH:-false}
      # Admin panel credentials – must be set or /api/admin/* returns 503
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Creator account linked to the admin user – enables one-click admin↔creator
      # mode switching in the dashboards (e.g. ADMIN_CREATOR_HANDLE=mochii).
      - ADMIN_CREATOR_HANDLE=${ADMIN_CREATOR_HANDLE:-}
      # Default creator account seeded at first startup.
      # Set CREATOR_HANDLE + CREATOR_PASSWORD so the account exists in the DB
      # without needing a separate POST /api/admin/creators call.
      # Example: CREATOR_HANDLE=mapletini  CREATOR_PASSWORD=<your-password>
      - CREATOR_HANDLE=${CREATOR_HANDLE:-}
      - CREATOR_PASSWORD=${CREATOR_PASSWORD:-}
      # Discord webhook – set to a Discord Incoming Webhook URL to receive
      # notifications when new questions are submitted to the Puppy Pouch.
      # Leave empty to disable notifications.
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # Discord channel IDs for bot-based delivery (preferred over webhook URL
      # when DISCORD_BOT_TOKEN is also set).
      # question channel: new Q&A notes with a Reply button
      - DISCORD_QUESTION_CHANNEL_ID=${DISCORD_QUESTION_CHANNEL_ID:-}
      # notification channel: answer-published / general site events
      - DISCORD_NOTIFICATION_CHANNEL_ID=${DISCORD_NOTIFICATION_CHANNEL_ID:-}
      # admin channel: private operational alerts (e.g. new store purchases)
      - DISCORD_ADMIN_CHANNEL_ID=${DISCORD_ADMIN_CHANNEL_ID:-}
      # Ed25519 public key from the Discord Developer Portal (Application →
      # General Information → Public Key).  Required for the reply button /
      # modal feature.  Leave empty to disable Discord interactions.
      - DISCORD_PUBLIC_KEY=${DISCORD_PUBLIC_KEY:-}
      # ── Discord OAuth2 / Linked Roles ─────────────────
      # Register an OAuth2 application at https://discord.com/developers/applications
      # and configure its Linked Roles Verification URL to {BASE_URL}/discord/verify-user.
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      # Must match the redirect URI registered in the Discord Developer Portal.
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI:-}
      # Bot token – used on startup to register the Linked Roles metadata schema.
      # Create a Bot user in the Discord Developer Portal and copy its token here.
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # Public root URL of the site used to generate deep-links in Discord
      # embeds (e.g. https://mochii.live).  Leave empty to omit deep-links.
      - BASE_URL=${BASE_URL:-}
      # CORS: comma-separated list of allowed origins (e.g. https://mochii.live,https://shop.mochii.live).
      # Leave empty to auto-derive from BASE_URL (root + anon/links/shop/drool/mochii/creator subdomains).
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # Cookie domain for cross-subdomain session sharing (e.g. .mochii.live).
      # Leave empty to auto-derive from BASE_URL.
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      # Redis connection URL for teaser rate-limiting
      - REDIS_URL=redis://redis:6379
      # ── Store / Payment ───────────────────────────────
      # Payment provider selection (default: segpay)
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-segpay}
      # Segpay credentials – obtain from your Segpay merchant dashboard
      # Used for one-time store purchases (physical goods).
      - SEGPAY_PACKAGE_ID=${SEGPAY_PACKAGE_ID:-}
      - SEGPAY_PRICE_POINT_ID=${SEGPAY_PRICE_POINT_ID:-}
      # Optional: shared secret for Segpay postback HMAC-SHA256 verification (store)
      - SEGPAY_WEBHOOK_SECRET=${SEGPAY_WEBHOOK_SECRET:-}
      # ── Segpay Subscriptions ──────────────────────────
      # Separate Segpay package configured for recurring subscription billing.
      # Set these in the Segpay merchant dashboard as a recurring package.
      - SEGPAY_SUB_PACKAGE_ID=${SEGPAY_SUB_PACKAGE_ID:-}
      - SEGPAY_SUB_PRICE_POINT_ID=${SEGPAY_SUB_PRICE_POINT_ID:-}
      # Access level granted to a subscriber (default: 2).
      # 0 = free/no access, 1 = free follower, 2 = subscriber, 3 = premium.
      - SEGPAY_SUB_ACCESS_LEVEL=${SEGPAY_SUB_ACCESS_LEVEL:-2}
      # Optional: shared secret for subscription postback HMAC-SHA256 verification
      - SEGPAY_SUB_WEBHOOK_SECRET=${SEGPAY_SUB_WEBHOOK_SECRET:-}
      # ── The Drool Log – Reddit scraper credentials ────
      # Set REDDIT_MODE to control how Reddit items are collected:
      #   api    – poll Reddit directly via praw (requires OAuth app registration)
      #   ifttt  – items arrive via POST to /api/drool/ifttt/reddit (may be blocked by WAF/proxy)
      #   gsheet – poll a Google Sheet that your IFTTT applet writes to (recommended when
      #            the direct webhook is blocked).  Share the sheet as "Anyone with the link
      #            can view", then File → Share → Publish to web → CSV and paste the URL below.
      - REDDIT_MODE=${REDDIT_MODE:-api}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USERNAME=${REDDIT_USERNAME:-}
      - REDDIT_PASSWORD=${REDDIT_PASSWORD:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-drool-log/1.0}
      # Shared secret for the IFTTT webhook URL (?secret=...) – only needed when REDDIT_MODE=ifttt
      - REDDIT_IFTTT_SECRET=${REDDIT_IFTTT_SECRET:-}
      # Google Sheets CSV export URLs – only needed when REDDIT_MODE=gsheet
      # IFTTT needs separate applets for upvotes and saves; each writes to its own sheet.
      # Publish each sheet via File → Share → Publish to web → CSV and paste the URL here.
      - REDDIT_GSHEET_CSV_URL=${REDDIT_GSHEET_CSV_URL:-}
      - REDDIT_GSHEET_CSV_URL_2=${REDDIT_GSHEET_CSV_URL_2:-}
      # ── The Drool Log – Twitter/X scraper credentials ─
      # Create an app at https://developer.twitter.com
      # To enable "Login with X" on the admin panel, register
      #   {BASE_URL}/auth/twitter/callback
      # as an OAuth 1.0a callback URL in the Twitter Developer Portal app settings.
      # To enable bookmark scraping, also enable OAuth 2.0 User Authentication,
      # register {BASE_URL}/auth/twitter2/callback as a callback URL, and enable
      # the bookmark.read scope.  Then set TWITTER_CLIENT_ID and
      # TWITTER_CLIENT_SECRET below (different from the 1.0a API Key/Secret).
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - TWITTER_USER_ID=${TWITTER_USER_ID:-}
      - TWITTER_API_KEY=${TWITTER_API_KEY:-}
      - TWITTER_API_SECRET=${TWITTER_API_SECRET:-}
      - TWITTER_ACCESS_TOKEN=${TWITTER_ACCESS_TOKEN:-}
      - TWITTER_ACCESS_SECRET=${TWITTER_ACCESS_SECRET:-}
      - TWITTER_CLIENT_ID=${TWITTER_CLIENT_ID:-}
      - TWITTER_CLIENT_SECRET=${TWITTER_CLIENT_SECRET:-}
      # Optional: override which Twitter user ID is allowed to log in as admin.
      # Defaults to TWITTER_USER_ID when not set.
      - TWITTER_ADMIN_USER_ID=${TWITTER_ADMIN_USER_ID:-}
      # Optional: admin JWT lifetime in minutes (default 1440 = 24 h).
      - TWITTER_ADMIN_TOKEN_EXPIRE_MINUTES=${TWITTER_ADMIN_TOKEN_EXPIRE_MINUTES:-1440}
      # ── The Drool Log – Bluesky scraper credentials ───
      # Create an app password at https://bsky.app/settings/app-passwords
      - BSKY_HANDLE=${BSKY_HANDLE:-}
      - BSKY_APP_PASSWORD=${BSKY_APP_PASSWORD:-}
      # Salt used to anonymise commenter IPs in the Drool Log
      - DROOL_SALT=${DROOL_SALT:-}
      # Printful API key – required for automatic print-on-demand fulfilment
      - PRINTFUL_API_KEY=${PRINTFUL_API_KEY:-}
      # ── Cloudflare API ────────────────────────────────
      # API token used for DNS/load-balancer management and analytics queries.
      # Required permissions: DNS:Edit, Load Balancers:Edit, Analytics:Read,
      # Email Routing Rules:Edit.
      # Generate a scoped token at https://dash.cloudflare.com/profile/api-tokens
      - CLAPI=${CLAPI:-}
      # Zone ID for the site's domain.  When empty the zone is auto-discovered
      # from BASE_URL via the Cloudflare API and cached for the process lifetime.
      - CLAPI_ZONE_ID=${CLAPI_ZONE_ID:-}
      # Cloudflare Tunnel edge hostname (e.g. <uuid>.cfargotunnel.com).
      # When set, new creator subdomains are automatically provisioned as
      # proxied CNAME records pointing at the tunnel.  Leave empty to skip.
      - CLAPI_TUNNEL_HOSTNAME=${CLAPI_TUNNEL_HOSTNAME:-}
      # Email address for per-creator routing rules (e.g. admin@mochii.live).
      # When set, a forwarding rule is auto-created for {handle}@{domain}.
      # Leave empty to manage email routing manually.
      - CLAPI_EMAIL_ROUTING_DEST=${CLAPI_EMAIL_ROUTING_DEST:-}
      # ── Outbound SMTP – send-as for creators ──────────
      # Required for POST /api/creator/email/send.
      # Use any SMTP relay (e.g. Mailgun, Postmark, SendGrid, Gmail SMTP).
      # SMTP_PORT defaults to 587 (STARTTLS) when not set.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # ── Spotify – Now Playing & Queue ─────────────────
      # Create an app at https://developer.spotify.com/dashboard and add
      # {BASE_URL}/auth/spotify/callback as a Redirect URI.
      # Then visit {BASE_URL}/auth/spotify/login while logged into the admin
      # panel to authorize the creator's Spotify account.
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
    volumes:
      # Persist the SQLite database across container restarts
      - camera_data:/app/data
    depends_on:
      - go2rtc
      - redis
    restart: unless-stopped

  # ── go2rtc – RTSP → WebRTC bridge ───────────────────
  go2rtc:
    image: alexxit/go2rtc
    ports:
      - "1984:1984"   # HTTP API / web UI
      - "1935:1935"   # RTMP ingest (OBS / streaming software)
      - "8554:8554"   # RTSP server (re-stream)
      - "8555:8555"   # WebRTC/ICE TCP
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    restart: unless-stopped

  # ── Redis – rate-limiting store ─────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # ── Cloudflare Tunnel – VPS to public web ───────────
  # Exposes the backend through a Cloudflare Tunnel without opening inbound
  # firewall ports.  Create a tunnel in the Cloudflare Zero Trust dashboard,
  # then set CLFD_TOKEN in the Komodo stack environment.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLFD_TOKEN}
    environment:
      - CLFD_TOKEN=${CLFD_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

  # ── Tailscale – secure site-to-site VPN ─────────────
  # Placeholder: enables encrypted connectivity between this VPS and the
  # local-edge agent (Tapo switches, AI camera routing) without exposing
  # any edge ports to the public internet.
  # Before enabling, set TS_AUTHKEY to a Tailscale auth key:
  #   https://login.tailscale.com/admin/settings/keys
  tailscale:
    image: tailscale/tailscale
    hostname: vps-cloud
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

volumes:
  camera_data:
  tailscale_state:
