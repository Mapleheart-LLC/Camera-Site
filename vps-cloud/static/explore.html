<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explore – mochii.live</title>
<meta name="description" content="Discover creators, trending content and community posts on mochii.live.">
<meta property="og:title" content="Explore – mochii.live">
<meta property="og:description" content="Discover creators, trending content and community posts.">
<meta property="og:type" content="website">
<link rel="manifest" href="/manifest.json">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "Explore – mochii.live",
  "description": "Discover creators, trending content and community posts on mochii.live."
}
</script>
<style>
  :root{
    --bg:#1a1a1a;--card:#242424;--border:#3d2a2e;--accent:#c49a9f;
    --text:#f0e6e8;--muted:#9e7e82;--dim:#6a4a4e;
  }
  [data-theme="light"]{
    --bg:#f5f0f1;--card:#ffffff;--border:#e0d0d2;--accent:#a0686e;
    --text:#2a1a1c;--muted:#6b4e51;--dim:#b0909a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:1rem 1.5rem;
         display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  header h1{color:var(--accent);font-size:1.4rem;flex:1}
  .search-bar{display:flex;gap:.5rem;flex:2;min-width:220px}
  .search-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:.6rem 1rem;color:var(--text);font-size:.95rem}
  .search-bar button,.theme-toggle{background:var(--accent);color:#1a1a1a;border:none;border-radius:8px;
    padding:.6rem 1.2rem;font-weight:700;cursor:pointer;font-size:.9rem}
  .theme-toggle{background:var(--border);color:var(--text);padding:.6rem .9rem}
  main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
  section{margin-bottom:3rem}
  section h2{color:var(--accent);margin-bottom:1.25rem;font-size:1.2rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
  .grid{display:grid;gap:1rem}
  .grid-4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .grid-3{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;
        transition:border-color .2s}
  .card:hover{border-color:var(--accent)}
  .creator-card{display:flex;gap:1rem;align-items:center}
  .avatar{width:52px;height:52px;border-radius:50%;background:var(--border);
          object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;
          font-size:1.4rem;color:var(--accent)}
  .creator-info h3{font-size:1rem;margin-bottom:.25rem}
  .creator-info p{font-size:.82rem;color:var(--muted);overflow:hidden;
                  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .drool-card img{width:100%;border-radius:8px;margin-bottom:.75rem;max-height:180px;object-fit:cover}
  .drool-card p{font-size:.88rem;color:var(--muted);overflow:hidden;
                display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
  .meta{font-size:.78rem;color:var(--dim);margin-top:.5rem}
  .post-card h3{font-size:1rem;margin-bottom:.4rem}
  .post-card .meta{margin-top:.25rem}
  .product-card img{width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:.75rem}
  .product-card h3{font-size:.95rem}
  .price{color:var(--accent);font-weight:700;margin-top:.4rem}
  .empty{color:var(--muted);font-style:italic;font-size:.9rem}
  .search-results{display:none}
  .search-results.active{display:block}
  #explore-content{display:block}
  #explore-content.hidden{display:none}
  .tag-chip{display:inline-block;background:var(--border);color:var(--accent);
            border-radius:20px;padding:.25rem .75rem;font-size:.78rem;margin:.2rem;cursor:pointer}
  .tag-chip:hover{background:var(--accent);color:#1a1a1a}
</style>
</head>
<body>
<header>
  <h1>🌸 Explore mochii.live</h1>
  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search creators, content, products…" autocomplete="off">
    <button onclick="runSearch()">Search</button>
  </div>
  <a href="/" style="color:var(--muted);text-decoration:none;font-size:.9rem">← Home</a>
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button>
</header>

<main>
  <!-- Search results (hidden by default) -->
  <div id="search-results" class="search-results">
    <section>
      <h2>Search Results</h2>
      <div id="search-output"></div>
    </section>
  </div>

  <!-- Explore feed -->
  <div id="explore-content">
    <!-- Trending Drool -->
    <section>
      <h2>🔥 Trending This Week</h2>
      <div id="drool-grid" class="grid grid-3"><p class="empty">Loading…</p></div>
    </section>

    <!-- Newest Community Posts -->
    <section>
      <h2>📝 Latest Posts</h2>
      <div id="posts-grid" class="grid grid-3"><p class="empty">Loading…</p></div>
    </section>

    <!-- Top Products -->
    <section>
      <h2>🛍️ Shop</h2>
      <div id="products-grid" class="grid grid-4"><p class="empty">Loading…</p></div>
    </section>
  </div>
</main>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('theme');
  if(saved) document.documentElement.setAttribute('data-theme', saved);
})();
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}

// ── Load explore feed ──────────────────────────────────────────────────────
async function loadExplore(){
  try{
    const data = await fetch('/api/explore').then(r=>r.json());
    renderDrool(data.trending_drool||[]);
    renderPosts(data.newest_posts||[]);
    renderProducts(data.top_products||[]);
  }catch(e){
    console.error('Explore load failed',e);
  }
}

function renderDrool(items){
  const el = document.getElementById('drool-grid');
  if(!items.length){el.innerHTML='<p class="empty">No trending content yet.</p>';return;}
  el.innerHTML = items.map(d=>`
    <div class="card drool-card">
      ${d.media_url?`<img src="${esc(d.media_url)}" alt="" loading="lazy">`:''}
      <p>${esc(d.caption||'')}</p>
      <div class="meta">👁 ${d.view_count||0} &bull; ${esc(d.creator_handle||'')}</div>
    </div>`).join('');
}

function renderPosts(items){
  const el = document.getElementById('posts-grid');
  if(!items.length){el.innerHTML='<p class="empty">No posts yet.</p>';return;}
  el.innerHTML = items.map(p=>`
    <div class="card post-card">
      <h3>${esc(p.title)}</h3>
      <div class="meta">By ${esc(p.creator_handle)} &bull; ${fmtDate(p.published_at)}</div>
    </div>`).join('');
}

function renderProducts(items){
  const el = document.getElementById('products-grid');
  if(!items.length){el.innerHTML='<p class="empty">No products yet.</p>';return;}
  el.innerHTML = items.map(p=>`
    <div class="card product-card">
      ${p.image_url?`<img src="${esc(p.image_url)}" alt="${esc(p.name)}" loading="lazy">`:''}
      <h3>${esc(p.name)}</h3>
      <div class="price">$${(p.price||0).toFixed(2)}</div>
      <div class="meta">${esc(p.creator_handle||'')}</div>
    </div>`).join('');
}

// ── Search ─────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('keydown', e=>{ if(e.key==='Enter') runSearch(); });

async function runSearch(){
  const q = searchInput.value.trim();
  const resultsEl = document.getElementById('search-results');
  const exploreEl = document.getElementById('explore-content');
  const outputEl  = document.getElementById('search-output');
  if(!q){
    resultsEl.classList.remove('active');
    exploreEl.classList.remove('hidden');
    return;
  }
  resultsEl.classList.add('active');
  exploreEl.classList.add('hidden');
  outputEl.innerHTML = '<p class="empty">Searching…</p>';
  try{
    const data = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=all`).then(r=>r.json());
    const sections = [];
    for(const [type, items] of Object.entries(data.results||{})){
      if(!items.length) continue;
      sections.push(`<h3 style="color:var(--accent);margin:.75rem 0 .5rem">${type}</h3>`);
      sections.push('<div class="grid grid-3">' + items.map(item=>`
        <div class="card"><strong>${esc(item.title||item.display_name||item.name||'')}</strong>
        <div class="meta">${esc(item.creator_handle||item.handle||item.result_type||'')}</div>
        </div>`).join('') + '</div>');
    }
    outputEl.innerHTML = sections.length ? sections.join('') : '<p class="empty">No results found.</p>';
  }catch(e){
    outputEl.innerHTML = '<p class="empty">Search failed. Please try again.</p>';
  }
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso){
  if(!iso) return '';
  try{ return new Date(iso).toLocaleDateString(); }catch(_){ return iso; }
}

// ── Service Worker ─────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

loadExplore();
</script>
</body>
</html>
