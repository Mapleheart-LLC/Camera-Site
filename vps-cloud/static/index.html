<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Site</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Login card ─────────────────────────────────── */
    #login-section {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      text-align: center;
    }

    #login-section h1 {
      font-size: 1.5rem;
      margin-bottom: .75rem;
      color: #93c5fd;
    }

    #login-section p.tagline {
      font-size: .9rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    /* Fanvue brand button */
    #fanvue-login-btn {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .75rem 1.5rem;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .1s;
    }

    #fanvue-login-btn:hover  { background: #6d28d9; }
    #fanvue-login-btn:active { transform: scale(.98); }

    #fanvue-login-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    #login-message {
      margin-top: 1.25rem;
      font-size: .85rem;
      min-height: 1.2em;
    }

    #login-message.error   { color: #f87171; }
    #login-message.info    { color: #94a3b8; }
    #login-message.upgrade { color: #f59e0b; }

    /* ── Dashboard ──────────────────────────────────── */
    #dashboard-section {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: column;
    }

    #dashboard-section header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    #dashboard-section header h1 {
      font-size: 1.4rem;
      color: #93c5fd;
    }

    #logout-btn {
      background: transparent;
      border: 1px solid #4b5563;
      border-radius: 6px;
      color: #94a3b8;
      padding: .4rem .9rem;
      cursor: pointer;
      font-size: .875rem;
      transition: border-color .2s, color .2s;
    }

    #logout-btn:hover { border-color: #f87171; color: #f87171; }

    /* ── Main layout: sidebar + viewer ─────────────── */
    #main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────────── */
    #camera-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      padding: 1rem .75rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    #camera-sidebar h2 {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      padding: 0 .25rem .5rem;
      border-bottom: 1px solid #2d3148;
      margin-bottom: .25rem;
    }

    .cam-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #94a3b8;
      padding: .6rem .75rem;
      text-align: left;
      cursor: pointer;
      font-size: .9rem;
      transition: background .15s, border-color .15s, color .15s;
    }

    .cam-btn:hover {
      background: #252840;
      border-color: #3b82f6;
      color: #e2e8f0;
    }

    .cam-btn.active {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #93c5fd;
      font-weight: 600;
    }

    #sidebar-message {
      font-size: .85rem;
      color: #64748b;
      padding: .25rem;
    }

    #upgrade-prompt {
      display: none;
      margin-top: .5rem;
      padding: .75rem;
      background: #1f1a00;
      border: 1px solid #78350f;
      border-radius: 6px;
      font-size: .82rem;
      color: #fbbf24;
      line-height: 1.4;
    }

    #upgrade-prompt a {
      color: #f59e0b;
      font-weight: 600;
    }

    /* ── Video viewer ───────────────────────────────── */
    #viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #0f1117;
      overflow: hidden;
    }

    #viewer-title {
      font-size: 1.1rem;
      color: #94a3b8;
      margin-bottom: .75rem;
      align-self: flex-start;
    }

    #stream-video {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      display: block;
    }

    #stream-status {
      margin-top: .5rem;
      font-size: .85rem;
      color: #64748b;
      align-self: flex-start;
    }

    #stream-status.connecting { color: #f59e0b; }
    #stream-status.live       { color: #34d399; }
    #stream-status.error      { color: #f87171; }

    #viewer-placeholder {
      color: #4b5563;
      font-size: 1rem;
    }

    /* ── IoT Controls bar ───────────────────────────── */
    #controls-bar {
      display: none;
      align-items: center;
      gap: 1rem;
      padding: .75rem 1.5rem;
      border-top: 1px solid #2d3148;
      background: #1a1d27;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #controls-bar h2 {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      white-space: nowrap;
      margin: 0;
    }

    #controls-buttons {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .control-btn {
      padding: .5rem 1.25rem;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      color: #93c5fd;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      white-space: nowrap;
      min-width: 130px;
    }

    .control-btn:hover:not(:disabled) {
      background: #1d4ed8;
      border-color: #60a5fa;
      color: #fff;
    }

    .control-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- ── Login Section ─────────────────────────────── -->
  <section id="login-section">
    <h1>🎥 Camera Site</h1>
    <p class="tagline">Sign in with your Fanvue account to access live streams.</p>

    <a id="fanvue-login-btn" href="/auth/login">
      <!-- Fanvue-style F icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3h18v3H9v3h9v3H9v9H6V9H3V3z"/>
      </svg>
      Login with Fanvue
    </a>

    <p id="login-message" role="alert" aria-live="polite"></p>
  </section>

  <!-- ── Dashboard Section ─────────────────────────── -->
  <section id="dashboard-section" aria-label="Camera Dashboard">
    <header>
      <h1>🎥 Live Cameras</h1>
      <button id="logout-btn">Log out</button>
    </header>
    <div id="main-layout">
      <!-- Sidebar -->
      <nav id="camera-sidebar" aria-label="Camera list">
        <h2>Cameras</h2>
        <p id="sidebar-message">Loading…</p>
        <div id="upgrade-prompt">
          🔒 No cameras are available at your current subscription tier.<br>
          <a href="https://fanvue.com" target="_blank" rel="noopener noreferrer">
            Upgrade your Fanvue subscription
          </a>
          to unlock streams.
        </div>
      </nav>
      <!-- Viewer -->
      <div id="viewer">
        <p id="viewer-placeholder">Select a camera from the sidebar.</p>
        <video id="stream-video" style="display:none;" autoplay muted playsinline controls></video>
        <p id="stream-status" class="stream-status" style="display:none;"></p>
        <p id="viewer-title" style="display:none;"></p>
      </div>
    </div>
    <!-- ── IoT Controls bar ──────────────────────────── -->
    <div id="controls-bar" aria-label="Interactive device controls">
      <h2>Interactive Controls</h2>
      <div id="controls-buttons">
        <button id="pishock-btn" class="control-btn">⚡ PiShock</button>
        <button id="lovense-btn" class="control-btn">💜 Lovense</button>
      </div>
    </div>
  </section>

  <script>
    // ── Storage helpers ───────────────────────────────
    const TOKEN_KEY = 'camera_site_token';

    function saveToken(token) { sessionStorage.setItem(TOKEN_KEY, token); }
    function getToken()       { return sessionStorage.getItem(TOKEN_KEY); }
    function clearToken()     { sessionStorage.removeItem(TOKEN_KEY); }

    // ── UI toggles ────────────────────────────────────
    function showDashboard() {
      document.getElementById('login-section').style.display     = 'none';
      const dash = document.getElementById('dashboard-section');
      dash.style.display = 'flex';
      document.body.style.alignItems = 'stretch';
    }

    function showLogin(msg, msgClass) {
      document.getElementById('login-section').style.display     = 'block';
      document.getElementById('dashboard-section').style.display = 'none';
      document.body.style.alignItems = 'center';

      const msgEl = document.getElementById('login-message');
      if (msg) {
        msgEl.textContent = msg;
        msgEl.className   = msgClass || 'info';
      } else {
        msgEl.textContent = '';
        msgEl.className   = '';
      }
    }

    // ── Active WebRTC peer connection ─────────────────
    let activePc = null;

    // ── WebRTC stream using go2rtc API ────────────────
    async function startWebRTCStream(webrtcApiUrl) {
      const videoEl  = document.getElementById('stream-video');
      const statusEl = document.getElementById('stream-status');

      if (activePc) { activePc.close(); activePc = null; }
      videoEl.srcObject = null;

      statusEl.textContent = 'Connecting…';
      statusEl.className   = 'stream-status connecting';

      const pc = new RTCPeerConnection({ iceServers: [] });
      activePc = pc;

      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      pc.ontrack = (ev) => {
        if (ev.streams && ev.streams[0]) {
          videoEl.srcObject = ev.streams[0];
          statusEl.textContent = '● Live';
          statusEl.className   = 'stream-status live';
        }
      };

      pc.oniceconnectionstatechange = () => {
        if (['failed', 'disconnected', 'closed'].includes(pc.iceConnectionState)) {
          statusEl.textContent = 'Connection lost – reload to retry';
          statusEl.className   = 'stream-status error';
        }
      };

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const ICE_GATHERING_TIMEOUT_MS = 3000;
        await new Promise((resolve) => {
          if (pc.iceGatheringState === 'complete') { resolve(); return; }
          pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') resolve();
          };
          setTimeout(resolve, ICE_GATHERING_TIMEOUT_MS);
        });

        const response = await fetch(webrtcApiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ data: pc.localDescription.sdp }),
        });

        if (!response.ok) throw new Error(`go2rtc returned ${response.status}`);

        const answerSdp = await response.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
      } catch (err) {
        console.error('WebRTC error:', err);
        statusEl.textContent = `Error: ${err.message}`;
        statusEl.className   = 'stream-status error';
      }
    }

    // ── Switch to a camera ────────────────────────────
    function selectCamera(displayName, streamSlug, buttonEl) {
      document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
      buttonEl.classList.add('active');

      document.getElementById('viewer-placeholder').style.display = 'none';
      document.getElementById('stream-video').style.display       = 'block';
      document.getElementById('stream-status').style.display      = 'block';
      document.getElementById('viewer-title').style.display       = 'block';
      document.getElementById('viewer-title').textContent         = displayName;

      const go2rtcHost = window.GO2RTC_HOST || 'localhost';
      const go2rtcPort = window.GO2RTC_PORT || '1984';
      const webrtcApiUrl =
        `http://${go2rtcHost}:${go2rtcPort}/api/webrtc?src=${encodeURIComponent(streamSlug)}`;

      startWebRTCStream(webrtcApiUrl);
    }

    // ── Render sidebar camera buttons ─────────────────
    function renderSidebar(cameras) {
      const sidebar     = document.getElementById('camera-sidebar');
      const upgradeEl   = document.getElementById('upgrade-prompt');
      const sidebarMsg  = document.getElementById('sidebar-message');

      sidebar.querySelectorAll('.cam-btn').forEach(el => el.remove());
      if (sidebarMsg) sidebarMsg.remove();

      if (cameras.length === 0) {
        upgradeEl.style.display = 'block';
        return;
      }

      upgradeEl.style.display = 'none';
      cameras.forEach((cam) => {
        const btn = document.createElement('button');
        btn.className   = 'cam-btn';
        btn.textContent = cam.display_name;
        btn.addEventListener('click', () => selectCamera(cam.display_name, cam.stream_slug, btn));
        // Insert before upgrade-prompt so it stays at the bottom
        sidebar.insertBefore(btn, upgradeEl);
      });
    }

    // ── Load allowed cameras from the protected API ───
    async function loadCameras() {
      const token = getToken();
      if (!token) { showLogin(); return; }

      try {
        const resp = await fetch('/api/my-cameras', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (resp.status === 401) { clearToken(); showLogin(); return; }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const cameras = await resp.json();
        renderSidebar(cameras);
      } catch (err) {
        const sidebar = document.getElementById('camera-sidebar');
        sidebar.querySelectorAll('.cam-btn, #sidebar-message').forEach(el => el.remove());
        const msg = document.createElement('p');
        msg.id = 'sidebar-message';
        msg.textContent = `Failed to load cameras: ${err.message}`;
        sidebar.appendChild(msg);
      }
    }

    // ── IoT Controls ──────────────────────────────────

    /**
     * Decode the payload section of a JWT without verifying the signature.
     *
     * NOTE: This is used only to make UI decisions (e.g., show/hide buttons).
     * It is NOT a security boundary – authorisation is always enforced server-side.
     */
    function decodeJwtPayload(token) {
      try {
        const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(b64));
      } catch { return null; }
    }

    /** Format a number of seconds as MM:SS. */
    function formatCountdown(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // Fallback cooldown duration (seconds) used when the Retry-After header is
    // absent.  Must match _COOLDOWN_SECONDS in routers/interactive.py.
    const COOLDOWN_FALLBACK_SECONDS = 3600;

    /** Active countdown interval handles keyed by device name. */
    const controlTimers = {};

    /**
     * Start (or restart) a countdown display on *btn* until *endTimeMs*.
     * Disables the button while the cooldown is active and re-enables it when
     * it expires.  The cooldown end time is persisted in sessionStorage so
     * that the timer survives a page reload.
     */
    function startCooldownDisplay(device, btn, baseLabel, endTimeMs) {
      if (controlTimers[device]) clearInterval(controlTimers[device]);

      function tick() {
        const remaining = Math.ceil((endTimeMs - Date.now()) / 1000);
        if (remaining <= 0) {
          clearInterval(controlTimers[device]);
          delete controlTimers[device];
          sessionStorage.removeItem(`${device}_cooldown_until`);
          btn.disabled    = false;
          btn.textContent = baseLabel;
        } else {
          btn.disabled    = true;
          btn.textContent = `${baseLabel} (${formatCountdown(remaining)})`;
        }
      }

      tick(); // set initial state immediately
      controlTimers[device] = setInterval(tick, 1000);
    }

    /**
     * Call the control API for *device* and handle the response:
     *   200 – show activation feedback; start cooldown timer for teaser users.
     *   429 – extract Retry-After and start cooldown timer.
     *   401 – token expired; return to login.
     */
    async function triggerDevice(device, btn, baseLabel) {
      const token = getToken();
      if (!token) return;

      btn.disabled    = true;
      btn.textContent = `${baseLabel} …`;

      try {
        const resp = await fetch(`/api/control/${device}`, {
          method:  'POST',
          headers: { Authorization: `Bearer ${token}` },
        });

        if (resp.ok) {
          const data = await resp.json();
          if (data.activation_seconds) {
            // Teaser activation: show active state, then transition to countdown.
            const cooldownSeconds = data.cooldown_seconds || COOLDOWN_FALLBACK_SECONDS;
            const endTime = Date.now() + cooldownSeconds * 1000;
            sessionStorage.setItem(`${device}_cooldown_until`, endTime.toString());

            btn.textContent = `${baseLabel} (Active ${data.activation_seconds}s)`;
            setTimeout(() => {
              startCooldownDisplay(device, btn, baseLabel, endTime);
            }, data.activation_seconds * 1000);
          } else {
            // Premium: brief confirmation, then re-enable immediately.
            btn.disabled    = false;
            btn.textContent = `${baseLabel} ✓`;
            setTimeout(() => { btn.textContent = baseLabel; }, 2000);
          }
        } else if (resp.status === 429) {
          const retryAfter = parseInt(resp.headers.get('Retry-After') || COOLDOWN_FALLBACK_SECONDS, 10);
          const endTime    = Date.now() + retryAfter * 1000;
          sessionStorage.setItem(`${device}_cooldown_until`, endTime.toString());
          startCooldownDisplay(device, btn, baseLabel, endTime);
        } else if (resp.status === 401) {
          clearToken();
          showLogin();
        } else {
          btn.disabled    = false;
          btn.textContent = `${baseLabel} (Error)`;
          setTimeout(() => { btn.textContent = baseLabel; }, 3000);
        }
      } catch {
        btn.disabled    = false;
        btn.textContent = `${baseLabel} (Error)`;
        setTimeout(() => { btn.textContent = baseLabel; }, 3000);
      }
    }

    /**
     * Show the IoT controls bar if the current user holds access_level >= 1,
     * and restore any active cooldown timers from sessionStorage.
     */
    function initControls() {
      const token = getToken();
      if (!token) return;

      const payload = decodeJwtPayload(token);
      if (!payload || (payload.access_level || 0) < 1) return;

      document.getElementById('controls-bar').style.display = 'flex';

      const devices = [
        { id: 'pishock', label: '⚡ PiShock', btnId: 'pishock-btn' },
        { id: 'lovense', label: '💜 Lovense', btnId: 'lovense-btn' },
      ];

      devices.forEach(({ id, label, btnId }) => {
        const btn = document.getElementById(btnId);
        btn.addEventListener('click', () => triggerDevice(id, btn, label));

        // Restore a cooldown that was active before the last page load.
        const stored = sessionStorage.getItem(`${id}_cooldown_until`);
        if (stored) {
          const remaining = Math.ceil((parseInt(stored, 10) - Date.now()) / 1000);
          if (remaining > 0) {
            startCooldownDisplay(id, btn, label, parseInt(stored, 10));
          } else {
            sessionStorage.removeItem(`${id}_cooldown_until`);
          }
        }
      });
    }

    // ── Logout ────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', () => {
      if (activePc) { activePc.close(); activePc = null; }
      // Clear any active countdown timers and hide controls bar
      Object.values(controlTimers).forEach(clearInterval);
      Object.keys(controlTimers).forEach(k => delete controlTimers[k]);
      document.getElementById('controls-bar').style.display = 'none';
      // Clear persisted cooldown timestamps so a fresh login starts clean
      ['pishock', 'lovense'].forEach(d => sessionStorage.removeItem(`${d}_cooldown_until`));
      clearToken();
      showLogin();
    });

    // ── Handle OAuth callback (token or error in URL) ─
    (function handleOAuthCallback() {
      const hash   = window.location.hash.slice(1);  // strip leading '#'
      const params = new URLSearchParams(hash);
      const token  = params.get('token');
      const err    = params.get('error') || new URLSearchParams(window.location.search).get('error');

      // Clear the fragment/query so tokens aren't left in browser history
      if (token || err) {
        history.replaceState(null, '', window.location.pathname);
      }

      if (token) {
        saveToken(token);
        showDashboard();
        loadCameras();
        initControls();
        return;
      }

      if (err) {
        const messages = {
          invalid_state:          'Login session expired. Please try again.',
          token_exchange_failed:  'Could not complete sign-in with Fanvue. Please try again.',
          profile_fetch_failed:   'Could not retrieve your Fanvue profile. Please try again.',
          missing_params:         'Invalid callback. Please try again.',
          access_denied:          'Access was denied. Please authorize the app on Fanvue.',
        };
        showLogin(messages[err] || `Login error: ${err}`, 'error');
        return;
      }

      // No callback params – check for an existing session token
      if (getToken()) {
        showDashboard();
        loadCameras();
        initControls();
      } else {
        showLogin();
      }
    })();
  </script>
</body>
</html>
