# go2rtc configuration
# Camera streams are registered dynamically by the FastAPI backend via the
# go2rtc REST API (PUT /api/streams?name=<slug>&src=<rtsp_url>).
# RTMP streams are published by OBS/streaming software directly to port 1935.
# You do not need to add streams here manually.
# Documentation: https://github.com/AlexxIT/go2rtc

api:
  listen: ":1984"
  # go2rtc's API is accessed only by the FastAPI backend (internal network).
  # CORS here allows the backend container to reach it; the WebRTC SDP
  # exchange is proxied through FastAPI so browsers never hit go2rtc directly.
  cors_origin: "*"

rtmp:
  listen: ":1935"

webrtc:
  listen: ":8555/tcp"

log:
  level: info

# HLS recording – segments are written to /recordings/{stream_name}/.
# The backend mounts the same volume read-write so it can:
#   1. Serve DVR playlists filtered to the last 30 minutes.
#   2. Snapshot completed streams as permanent VOD archives.
hls:
  dir: /recordings
